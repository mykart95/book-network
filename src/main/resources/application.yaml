spring:
  datasource:
    url: jdbc:mysql://localhost:3306/udemy
    driverClassName: com.mysql.cj.jdbc.Driver
    username: root
    password: karmy

  jpa:
    hibernate:
      ddl-auto: update
      show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  mail:
    host: localhost
    port: 1025
    username: karmy
    password: karmy
    properties:
      mail:
        smtp:
          trust: "*"
        auth: true
        starttls:
          enabled: true
        connectiontimeout: 5000
        timeout: 3000
        writetimeout: 5000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

springdoc:
  default-produces-media-type: application/json

server:
  port: 8088
  servlet:
    context-path: /api/v1


application:
  security:
    jwt:
      secret: 60f04ada4b45291092bb4f346edac05b7046f3efc185fb7d18680e486d5a1d92
